<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Checkout | The Gaming Zone</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .checkout-grid { display: grid; grid-template-columns: 1fr 400px; gap: 40px; padding: 40px 0; }
        .checkout-form { background: var(--card-bg); padding: 30px; border-radius: 15px; }
        .form-section { margin-bottom: 30px; }
        .form-section h3 { font-family: 'Orbitron'; color: var(--secondary-color); margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        input, select { 
            background: #0a0a0c; border: 1px solid #333; color: white; 
            padding: 12px; border-radius: 5px; width: 100%;
        }
        .payment-methods { display: flex; gap: 15px; margin-top: 15px; }
        .method { 
            flex: 1; border: 1px solid #333; padding: 15px; text-align: center; 
            border-radius: 10px; cursor: pointer; transition: 0.3s;
        }
        .method.active { border-color: var(--primary-color); background: rgba(255, 0, 85, 0.1); }
        .method i { font-size: 1.5rem; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

    <main class="container">
        <h1 class="glitch-text" style="font-size: 2.5rem;">Secure <span>Checkout</span></h1>
        
        <div class="checkout-grid">
            <section class="checkout-form">
                <div class="form-section">
                    <h3><i class="fas fa-truck"></i> Shipping Details</h3>
                    <div class="input-group">
                        <input type="text" placeholder="Prénom">
                        <input type="text" placeholder="Nom">
                    </div>
                    <input type="email" placeholder="Email Address" style="margin-bottom: 15px;">
                    <input type="text" placeholder="Adresse complète">
                    <div class="input-group" style="margin-top: 15px;">
                        <input type="text" placeholder="Ville">
                        <input type="text" placeholder="Code Postal">
                    </div>
                </div>

                <div class="form-section">
                    <h3><i class="fas fa-credit-card"></i> Payment Method</h3>
                    <div class="payment-methods">
                        <div class="method active">
                            <i class="fab fa-cc-visa"></i>
                            <span>Card</span>
                        </div>
                        <div class="method">
                            <i class="fab fa-paypal"></i>
                            <span>PayPal</span>
                        </div>
                        <div class="method">
                            <i class="fas fa-wallet"></i>
                            <span>Crypto</span>
                        </div>
                    </div>
                    <div class="card-details" style="margin-top: 20px;">
                        <input type="text" placeholder="Card Number" style="margin-bottom: 15px;">
                        <div class="input-group">
                            <input type="text" placeholder="MM / YY">
                            <input type="text" placeholder="CVC">
                        </div>
                    </div>
                </div>
            </section>

            <aside class="order-summary">
                <div style="background: var(--card-bg); padding: 25px; border-radius: 15px;">
                    <h3>Your Order</h3>
                    <hr style="opacity: 0.1; margin: 15px 0;">
                    <div class="summary-item" style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <span>PS5 Console x1</span>
                        <span>499.00 €</span>
                    </div>
                    <div class="summary-item" style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <span>Shipping</span>
                        <span style="color: #00ff00;">Free</span>
                    </div>
                    <div class="summary-total" style="font-size: 1.5rem; color: var(--primary-color); margin-top: 20px; font-weight: bold;">
                        <span>Total: 499.00 €</span>
                    </div>
                    <button class="btn-main" style="width: 100%; margin-top: 25px; height: 50px;">
                        CONFIRM ORDER <i class="fas fa-lock"></i>
                    </button>
                    <p style="font-size: 0.7rem; color: var(--text-gray); text-align: center; margin-top: 15px;">
                        <i class="fas fa-shield-alt"></i> SSL Encrypted & Secure Payment
                    </p>
                </div>
            </aside>
        </div>
    </main>

</body>
</html>
