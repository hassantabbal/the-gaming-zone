<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Mon Panier | The Gaming Zone</title>
    <script src="js/cart.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .cart-container { display: grid; grid-template-columns: 1.5fr 1fr; gap: 40px; padding: 50px 0; }
        .cart-items { background: var(--card-bg); border-radius: 15px; padding: 25px; }
        .cart-item { 
            display: flex; align-items: center; gap: 20px; 
            padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .cart-item img { width: 100px; height: 100px; border-radius: 10px; object-fit: cover; }
        .item-details { flex-grow: 1; }
        .item-details h4 { font-family: 'Orbitron'; color: var(--text-white); }
        .quantity-controls { display: flex; align-items: center; gap: 15px; margin-top: 10px; }
        .qty-btn { background: #1a1a2e; border: 1px solid #333; color: white; padding: 5px 10px; cursor: pointer; }
        
        .order-summary { 
            background: var(--card-bg); padding: 30px; border-radius: 15px; 
            height: fit-content; border: 1px dashed var(--secondary-color);
        }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; color: var(--text-gray); }
        .summary-total { 
            font-size: 1.8rem; color: var(--primary-color); font-weight: 900; 
            border-top: 1px solid #333; padding-top: 15px; margin-top: 15px;
        }
        .promo-code { display: flex; gap: 10px; margin: 20px 0; }
        .promo-code input { 
            background: #0a0a0c; border: 1px solid #333; color: white; 
            padding: 10px; flex-grow: 1; border-radius: 5px;
        }
    </style>
</head>
<body>

    <main class="container">
        <h1 class="glitch-text" style="font-size: 2.5rem;">Shopping <span>Cart</span></h1>
        
        <div class="cart-container">
            <section class="cart-items" id="cart-list">
                <div class="cart-item">
                    <img src="https://images.unsplash.com/photo-1606144042614-b2417e99c4e3?q=80&w=200" alt="PS5">
                    <div class="item-details">
                        <h4>Sony PlayStation 5</h4>
                        <p>Console Next-Gen</p>
                        <div class="quantity-controls">
                            <button class="qty-btn">-</button>
                            <span>1</span>
                            <button class="qty-btn">+</button>
                        </div>
                    </div>
                    <div class="item-price">
                        <span style="font-weight: bold;">499.00 €</span>
                        <br>
                        <i class="fas fa-trash" style="color: #ff4444; cursor: pointer; margin-top: 10px;"></i>
                    </div>
                </div>
            </section>

            <aside class="order-summary">
                <h3>Résumé de la commande</h3>
                <div class="promo-code">
                    <input type="text" placeholder="Promo Code (ex: GAMER20)">
                    <button class="btn-main" style="padding: 10px;">Apply</button>
                </div>
                <div class="summary-row">
                    <span>Sous-total</span>
                    <span>499.00 €</span>
                </div>
                <div class="summary-row">
                    <span>Livraison (Shipping)</span>
                    <span style="color: #00ff00;">Gratuit</span>
                </div>
                <div class="summary-row">
                    <span>TVA (Tax)</span>
                    <span>99.80 €</span>
                </div>
                <div class="summary-total">
                    <span>TOTAL</span>
                    <span>598.80 €</span>
                </div>
                <button class="btn-main" style="width: 100%; margin-top: 20px; font-size: 1.1rem;">
                    PROCEED TO CHECKOUT <i class="fas fa-arrow-right"></i>
                </button>
            </aside>
        </div>
    </main>

</body>
</html>
