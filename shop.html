<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store | The Gaming Zone</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --primary-color: #ff0055;
            --secondary-color: #00f2ff;
            --card-bg: #161625;
            --text-gray: #a0a0a0;
        }

        .shop-container { display: grid; grid-template-columns: 280px 1fr; gap: 30px; padding: 40px 5%; }
        
        /* Sidebar Filters */
        .filters { background: var(--card-bg); padding: 25px; border-radius: 15px; height: fit-content; position: sticky; top: 100px; }
        .filter-group { margin-bottom: 25px; }
        .filter-group h4 { font-family: 'Orbitron'; margin-bottom: 15px; color: var(--secondary-color); font-size: 0.9rem; text-transform: uppercase; }
        .filter-group label { display: block; margin-bottom: 10px; color: var(--text-gray); cursor: pointer; transition: 0.3s; }
        .filter-group label:hover { color: white; }
        .filter-group input[type="checkbox"] { margin-right: 10px; accent-color: var(--primary-color); }

        /* Top Filter Buttons */
        .filter-buttons { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .filter-btn { 
            background: #1a1a1a; color: white; border: 1px solid var(--primary-color); 
            padding: 8px 18px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-family: 'Poppins';
        }
        .filter-btn.active, .filter-btn:hover { background: var(--primary-color); box-shadow: 0 0 10px var(--primary-color); }

        .shop-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .section-title { text-align: center; margin-top: 40px; font-family: 'Orbitron'; }
        .section-title span { color: var(--primary-color); }
        
        #product-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="container">
            <div class="logo"><a href="index.html">THE <span>GAMING</span> ZONE</a></div>
            <nav class="nav-menu">
                <ul>
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="#pc">PC Gaming</a></li>
                    <li><a href="#consoles">Consoles</a></li>
                    <li><a href="#gear">Gaming Gear</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <div class="search-bar">
                    <input type="text" id="main-search" placeholder="Search gear...">
                    <button><i class="fas fa-search"></i></button>
                </div>
                <div class="cart-icon">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="count" id="cart-count">0</span>
                </div>
            </div>
        </div>
    </header>

    <h1 class="section-title">TOUS LES <span>PRODUITS</span></h1>

    <div class="shop-container">
        <aside class="filters">
            <h3>Filters <i class="fas fa-filter"></i></h3>
            <hr style="opacity: 0.1; margin: 15px 0;">
            <div class="filter-group">
                <h4>Price Range</h4>
                <input type="range" id="price-filter" min="0" max="1000" step="50" style="width: 100%;">
                <div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-top: 10px;">
                    <span>0 €</span>
                    <span id="price-val">1000 €</span>
                </div>
            </div>
            <div class="filter-group">
                <h4>Quick Categories</h4>
                <div class="category-links">
                    <button class="filter-btn active" onclick="filterByCategory('ALL', this)">Tout</button>
                    <button class="filter-btn" onclick="filterByCategory('AUDIO', this)">Audio</button>
                    <button class="filter-btn" onclick="filterByCategory('GEAR', this)">Gear</button>
                    <button class="filter-btn" onclick="filterByCategory('CONSOLES', this)">Consoles</button>
                </div>
            </div>
        </aside>

        <main class="shop-content">
            <div class="shop-header">
                <p>Showing <span id="product-count">0</span> Products</p>
                <select class="sort-select" onchange="sortProducts(this.value)">
                    <option value="new">Sort by: Newest</option>
                    <option value="low">Price: Low to High</option>
                    <option value="high">Price: High to Low</option>
                </select>
            </div>

            <div class="product-grid" id="product-list">
                </div>
        </main>
    </div>

    <script >const products = [
        // --- 1. CONSOLES & CONTROLLERS (أجهزة التحكم والكونسول) ---
      { id: 1, name: "PS4 Slim 500GB",     category: "CONSOLES",     price: "850 TND",     image: "ps4.webp",     desc: "Console Noire + 1 Manette DualShock 4 (État Propre)" },
        {    id: 2,    name: "PS3 Super Slim",    category: "CONSOLES",    price: "380 TND",    image: "ps3.webp",    desc: "Système Classique 250GB + Jeux Installés"},
        {     id: 3,     name: "DualShock 4 Black",     category: "ACCESSORIES",     price: "165 TND",     image: "man4.webp",     desc: "Manette Sans Fil Originale v2" },
        {     id: 4,     name: "DualSense PS5 White",     category: "ACCESSORIES",     price: "245 TND",     image: "https://m.media-amazon.com/images/I/612bjwBuobS._AC_SL1500_.jpg",     desc: "Haptic Feedback (Retour haptique) Original" },
        { id: 5,  name: "Xbox Series Controller",  category: "ACCESSORIES",  price: "220 TND",  image: "manxbox.webp",  desc: "Carbon Black Wireless - Compatible PC/Xbox" },
        {  id: 6,  name: "Souris Gaming RGB", category: "GEAR", price: "85 TND", image: "sorie1.webp", desc: "Haute Précision pour Pro Gamers" },
    
        // --- 2. HEADSETS (سماعات) ---
        { id: 6, name: "HyperX Cloud II", category: "AUDIO", price: "320 TND", image: "HyperX Cloud II.webp", desc: "7.1 Virtual Surround Sound" },
        { id: 7, name: "Logitech G733 RGB", category: "AUDIO", price: "480 TND", image: "Logitech G733 RGB.webp", desc: "Lightspeed Wireless Gaming" },
        { id: 8, name: "Razer BlackShark V2", category: "AUDIO", price: "340 TND", image: "Razer BlackShark V2.WEBP", desc: "Titanium 50mm Drivers" },
        { id: 9, name: "SteelSeries Arctis 7", category: "AUDIO", price: "550 TND", image: "SteelSeries Arctis 7.WEBP", desc: "Lossless Wireless Audio" },
    
        // --- 3. SPEAKERS (بافل) ---
        { id: 12, name: "Razer Nommo Pro", category: "AUDIO", price: "900 TND", image: "Razer Nommo Pro.JPEG", desc: "THX Certified 2.1 Audio" },
        { id: 13, name: "Redragon GS520", category: "AUDIO", price: "95 TND", image: "Redragon GS520.JPEG", desc: "RGB Desktop Speakers" },
        { id: 14, name: "Creative Pebble V3", category: "AUDIO", price: "140 TND", image: "Creative Pebble V3.JPEG", desc: "USB-C Powered 2.0 Speakers" },
    
        // --- 4. MOUSEPADS (تجهيزات السطح) ---
        { id: 15, name: "Razer Goliathus Extended", category: "GEAR", price: "150 TND", image: "Razer Goliathus Extended.jpeg", desc: "Chroma RGB Mouse Mat" },
        { id: 16, name: "SteelSeries QcK XXL", category: "GEAR", price: "110 TND", image: "SteelSeries QcK XXL.JPEG", desc: "Professional Cloth Pad" },
        { id: 17, name: "Corsair MM300", category: "GEAR", price: "85 TND", image: "Corsair MM300.JPEG", desc: "High-Endurance Fabric" },
        { id: 18, name: "Logitech G840 XL", category: "GEAR", price: "170 TND", image: "Logitech G840 XL.JPEG", desc: "KDA Edition Large Pad" },
        { id: 26, name: "PS4 Vertical Stand", category: "ACCESSORIES", price: "45 TND", image: "PS4 Vertical Stand.jpeg", desc: "Cooling & Charging Station" },
       
    ];
    
    // وظيفة عرض المنتجات في الصفحة
    function renderShop() {
        const productList = document.getElementById('product-list');
        productList.innerHTML = ""; // مسح المنتجات القديمة
    
        products.forEach(item => {
            productList.innerHTML += `
                <div class="product-card">
                    <div class="product-image">
                        <img src="${item.image}" alt="${item.name}">
                    </div>
                    <div class="product-info">
                        <span class="category">${item.category}</span>
                        <h3>${item.name}</h3>
                        <p>${item.desc}</p>
                        <div class="price-row">
                            <span class="price">${item.price}</span>
                            <button class="add-btn">+ Add</button>
                        </div>
                    </div>
                </div>
            `;
        });
    }
    
    // تشغيل الوظيفة عند تحميل الصفحة
    document.addEventListener('DOMContentLoaded', renderShop);
    
    // 2. إدارة سلة المشتريات
    let cart = [];
    const cartBadge = document.querySelector('.cart-icon .count');
    
    // 3. وظيفة عرض المنتجات في الصفحة
    function displayProducts() {
        const productList = document.getElementById('product-list');
        
        // تفريغ المحتوى الحالي (إن وجد)
        productList.innerHTML = "";
    
        products.forEach(product => {
            const productHTML = `
                <div class="product-card">
                    <div class="product-img">
                        <img src="${product.image}" alt="${product.name}">
                    </div>
                    <div class="product-info">
                        <span class="category-tag">${product.category}</span>
                        <h3>${product.name}</h3>
                        <p class="specs">${product.specs}</p>
                        <div class="price-row">
                            <span class="price">${product.price} €</span>
                            <button onclick="addToCart(${product.id})" class="add-btn">
                                <i class="fas fa-plus"></i> Add
                            </button>
                        </div>
                    </div>
                </div>
            `;
            productList.innerHTML += productHTML;
        });
    }
    
    // 4. وظيفة الإضافة للسلة
    window.addToCart = function(productId) {
        const product = products.find(p => p.id === productId);
        cart.push(product);
        
        // تحديث الرقم في السلة
        cartBadge.innerText = cart.length;
        
        // تأثير بصري بسيط
        alert(`${product.name} ajouté au panier !`);
    };
    
    // 5. تشغيل الوظائف عند تحميل الصفحة
    document.addEventListener('DOMContentLoaded', () => {
        displayProducts();
        
        // تأثير الـ Header عند التمرير (Sticky Scroll)
        window.addEventListener('scroll', () => {
            const header = document.querySelector('.main-header');
            if (window.scrollY > 50) {
                header.style.padding = "10px 0";
                header.style.background = "rgba(10, 10, 12, 0.98)";
            } else {
                header.style.padding = "20px 0";
            }
        });
    });
    // البحث الفوري عن المنتجات
    const searchInput = document.querySelector('.search-bar input');
    
    if (searchInput) {
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            
            // تصفية المنتجات بناءً على الاسم أو الفئة
            const filteredProducts = products.filter(product => {
                return product.name.toLowerCase().includes(searchTerm) || 
                       product.category.toLowerCase().includes(searchTerm);
            });
    
            // إعادة عرض المنتجات المصفاة فقط
            renderFilteredProducts(filteredProducts);
        });
    }
    
    function renderFilteredProducts(filteredList) {
        const productList = document.getElementById('product-list') || document.getElementById('shop-grid');
        if (!productList) return;
    
        productList.innerHTML = "";
        
        if (filteredList.length === 0) {
            productList.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--text-gray);">Aucun produit trouvé... 🔍</p>`;
            return;
        }
    
        filteredList.forEach(product => {
            // نستخدم نفس كود عرض البطاقة الذي كتبناه سابقاً
            productList.innerHTML += `
                <div class="product-card">
                    <div class="product-img"><img src="${product.image}"></div>
                    <div class="product-info">
                        <h3>${product.name}</h3>
                        <div class="price-row">
                            <span class="price">${product.price} €</span>
                            <button onclick="addToCart(${product.id})" class="add-btn">Add</button>
                        </div>
                    </div>
                </div>`;
        });
    }
    const counters = document.querySelectorAll('.counter');
    const speed = 200;
    
    counters.forEach(counter => {
        const updateCount = () => {
            const target = +counter.getAttribute('data-target');
            const count = +counter.innerText;
            const inc = target / speed;
    
            if (count < target) {
                counter.innerText = Math.ceil(count + inc);
                setTimeout(updateCount, 1);
            } else {
                counter.innerText = target;
            }
        };
        updateCount();
    });</script>
</body>
</html>
